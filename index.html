<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptoElectro Lab - 光电实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0A0E17;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(0, 200, 200, 0.15);
        border-top-color: #00C8C8;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      .app-loading-text {
        margin-top: 16px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.35);
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading" id="app-loading">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">LOADING</div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
